<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="900" viewBox="0 0 1200 900" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F6F0EC"/>
      <stop offset="100%" stop-color="#F2ECE7"/>
    </linearGradient>
    <linearGradient id="flap" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#CBEAE4"/>
      <stop offset="100%" stop-color="#B8DDD6"/>
    </linearGradient>
    <linearGradient id="paper" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFFDFB"/>
      <stop offset="100%" stop-color="#FAF5F1"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="160%">
      <feDropShadow dx="0" dy="10" stdDeviation="18" flood-color="#D8C9C1" flood-opacity="0.45"/>
    </filter>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="160%">
      <feDropShadow dx="0" dy="5" stdDeviation="8" flood-color="#D8C9C1" flood-opacity="0.3"/>
    </filter>
    <linearGradient id="wax" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F7A79B"/>
      <stop offset="100%" stop-color="#E98579"/>
    </linearGradient>
  </defs>

  <g filter="url(#shadow)">
    <rect x="290" y="250" width="620" height="410" rx="24" fill="url(#paper)"/>

    <!-- inner envelope folds -->
    <path d="M310 438L600 615L890 438" stroke="#F0D8CF" stroke-width="3" stroke-linecap="round"/>
    <path d="M310 638L490 500" stroke="#F2E3DC" stroke-width="2" stroke-linecap="round" opacity="0.85"/>
    <path d="M890 638L710 500" stroke="#F2E3DC" stroke-width="2" stroke-linecap="round" opacity="0.85"/>

    <!-- flap -->
    <path d="M290 250H910V250C910 250 900 260 890 266C874 275 859 282 842 285C815 290 787 286 760 292C724 300 693 321 657 330C617 341 583 343 543 334C505 325 472 301 434 293C408 287 381 290 355 285C338 282 323 275 307 266C298 260 290 250 290 250Z" fill="url(#flap)"/>
    <path d="M305 264C324 275 344 281 364 285C390 290 417 287 443 292C481 300 514 324 552 332C586 339 614 339 648 332C686 324 719 300 757 292C783 287 810 290 836 285C856 281 876 275 895 264" stroke="#E7C587" stroke-width="6" stroke-linecap="round"/>

    <!-- wax seal -->
    <g filter="url(#softShadow)">
      <circle cx="600" cy="378" r="58" fill="url(#wax)"/>
      <circle cx="600" cy="378" r="42" stroke="#E57F74" stroke-width="4" opacity="0.45"/>
      <path d="M600 354C586 338 560 342 553 363C548 377 555 391 568 400C583 410 597 419 600 423C603 419 617 410 632 400C645 391 652 377 647 363C640 342 614 338 600 354Z" fill="#FAD1CA"/>
    </g>
  </g>

  <!-- decorations -->
  <g opacity="0.95">
    <!-- balloons left -->
    <g filter="url(#softShadow)">
      <ellipse cx="396" cy="432" rx="36" ry="46" fill="#5CB6F2"/>
      <ellipse cx="366" cy="482" rx="38" ry="48" fill="#F7D454"/>
      <ellipse cx="432" cy="482" rx="36" ry="46" fill="#F5A58F"/>
      <path d="M396 478C405 520 406 556 405 598" stroke="#D6B39F" stroke-width="2.2" stroke-linecap="round"/>
      <path d="M366 530C389 553 401 573 405 598" stroke="#D6B39F" stroke-width="2.2" stroke-linecap="round"/>
      <path d="M432 530C418 553 409 573 405 598" stroke="#D6B39F" stroke-width="2.2" stroke-linecap="round"/>
      <path d="M396 474L402 486L390 486Z" fill="#4BA3DE"/>
      <path d="M366 526L372 538L360 538Z" fill="#E8BE3F"/>
      <path d="M432 526L438 538L426 538Z" fill="#E38E79"/>
    </g>

    <!-- cupcake -->
    <g transform="translate(365 565)" filter="url(#softShadow)">
      <path d="M0 18C0 8 8 0 18 0H54C64 0 72 8 72 18C72 39 59 53 36 53C13 53 0 39 0 18Z" fill="#F8D79B"/>
      <path d="M6 44H66L58 90H14L6 44Z" fill="#8F7AE6"/>
      <path d="M18 44L20 90M34 44V90M50 44L48 90" stroke="#60D1C4" stroke-width="5" opacity="0.8"/>
      <path d="M36 -10C29 -1 29 8 36 12C43 8 43 -1 36 -10Z" fill="#FF8E69"/>
      <path d="M36 8C34 18 34 28 36 36" stroke="#A56A3D" stroke-width="3" stroke-linecap="round"/>
    </g>

    <!-- party hats right -->
    <g filter="url(#softShadow)">
      <path d="M792 458L855 386L890 506Z" fill="#F7F0D9"/>
      <path d="M804 444L857 392" stroke="#6BC1F5" stroke-width="10"/>
      <path d="M817 462L868 410" stroke="#F0A2B4" stroke-width="10"/>
      <path d="M830 480L878 430" stroke="#F7D454" stroke-width="10"/>
      <ellipse cx="859" cy="382" rx="12" ry="12" fill="#F2C15F"/>

      <path d="M818 578L856 540L878 610Z" fill="#FFF6EF"/>
      <path d="M826 570L856 542" stroke="#F0A2B4" stroke-width="8"/>
      <path d="M835 585L864 556" stroke="#C9A6F0" stroke-width="8"/>
      <ellipse cx="880" cy="548" rx="9" ry="9" fill="#8FC8F7"/>
    </g>

    <!-- confetti -->
    <g opacity="0.9">
      <circle cx="470" cy="390" r="4" fill="#F2C15F"/>
      <circle cx="515" cy="408" r="3.5" fill="#92D5C7"/>
      <circle cx="739" cy="410" r="4" fill="#F6A5A7"/>
      <circle cx="790" cy="470" r="4" fill="#8FC8F7"/>
      <circle cx="522" cy="565" r="4" fill="#F2C15F"/>
      <circle cx="700" cy="546" r="4" fill="#8FC8F7"/>
      <circle cx="746" cy="586" r="4" fill="#92D5C7"/>
      <circle cx="432" cy="590" r="4" fill="#F6A5A7"/>
      <circle cx="658" cy="618" r="3.5" fill="#C9A6F0"/>

      <path d="M770 430l7 12 14 2-10 9 3 13-12-7-12 7 3-13-10-9 14-2 3-12Z" fill="#F6A5A7"/>
      <path d="M505 614l7 12 14 2-10 9 3 13-12-7-12 7 3-13-10-9 14-2 3-12Z" fill="#F2C15F"/>
      <path d="M400 545l7 12 14 2-10 9 3 13-12-7-12 7 3-13-10-9 14-2 3-12Z" fill="#F6A5A7"/>
      <path d="M828 430l7 12 14 2-10 9 3 13-12-7-12 7 3-13-10-9 14-2 3-12Z" fill="#F2C15F"/>
    </g>
  </g>
</svg>

<!-- Opened envelope version for animation transition -->
<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="900" viewBox="0 0 1200 900" fill="none">
  <defs>
    <linearGradient id="bg2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F6F0EC"/>
      <stop offset="100%" stop-color="#F2ECE7"/>
    </linearGradient>
    <linearGradient id="paper2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFFDFB"/>
      <stop offset="100%" stop-color="#FAF5F1"/>
    </linearGradient>
    <linearGradient id="flapOpen" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#CBEAE4"/>
      <stop offset="100%" stop-color="#B8DDD6"/>
    </linearGradient>
    <filter id="shadow2" x="-20%" y="-20%" width="140%" height="160%">
      <feDropShadow dx="0" dy="10" stdDeviation="18" flood-color="#D8C9C1" flood-opacity="0.45"/>
    </filter>
    <filter id="softShadow2" x="-20%" y="-20%" width="140%" height="160%">
      <feDropShadow dx="0" dy="5" stdDeviation="8" flood-color="#D8C9C1" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- envelope body -->
  <g filter="url(#shadow2)">
    <rect x="290" y="330" width="620" height="330" rx="24" fill="url(#paper2)"/>

    <!-- inner folds -->
    <path d="M310 450L600 620L890 450" stroke="#F0D8CF" stroke-width="3" stroke-linecap="round"/>
    <path d="M310 660L500 520" stroke="#F2E3DC" stroke-width="2" stroke-linecap="round" opacity="0.85"/>
    <path d="M890 660L700 520" stroke="#F2E3DC" stroke-width="2" stroke-linecap="round" opacity="0.85"/>
  </g>

  <!-- opened flap rotated upward -->
  <g transform="translate(600 330) rotate(-180) translate(-600 -330)" filter="url(#softShadow2)">
    <path d="M290 330H910V330C910 330 900 340 890 346C874 355 859 362 842 365C815 370 787 366 760 372C724 380 693 401 657 410C617 421 583 423 543 414C505 405 472 381 434 373C408 367 381 370 355 365C338 362 323 355 307 346C298 340 290 330 290 330Z" fill="url(#flapOpen)"/>
  </g>

  <!-- decorations remain same so animation matches -->
  <g opacity="0.95">
    <g filter="url(#softShadow2)">
      <ellipse cx="396" cy="470" rx="36" ry="46" fill="#5CB6F2"/>
      <ellipse cx="366" cy="520" rx="38" ry="48" fill="#F7D454"/>
      <ellipse cx="432" cy="520" rx="36" ry="46" fill="#F5A58F"/>
    </g>

    <g transform="translate(365 595)" filter="url(#softShadow2)">
      <path d="M0 18C0 8 8 0 18 0H54C64 0 72 8 72 18C72 39 59 53 36 53C13 53 0 39 0 18Z" fill="#F8D79B"/>
      <path d="M6 44H66L58 90H14L6 44Z" fill="#8F7AE6"/>
    </g>

    <g filter="url(#softShadow2)">
      <path d="M792 480L855 408L890 528Z" fill="#F7F0D9"/>
      <ellipse cx="859" cy="404" rx="12" ry="12" fill="#F2C15F"/>
    </g>
  </g>
</svg>
